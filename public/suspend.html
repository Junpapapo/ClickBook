<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleeping Tab | ClickBook Memory Saver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      --card-bg: rgba(30, 41, 59, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.2);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #dbeafe 100%);
        --card-bg: rgba(255, 255, 255, 0.65);
        --card-border: rgba(99, 102, 241, 0.12);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent: #4f46e5;
        --accent-glow: rgba(79, 70, 229, 0.15);
        --emerald: #059669;
        --emerald-glow: rgba(5, 150, 105, 0.15);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      perspective: 1000px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
    }

    /* Decorative background glowing orb */
    .glow-orb {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 250px;
      height: 250px;
      background: var(--accent);
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      border-radius: 50%;
    }

    .sleeping-icon-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
    }

    .favicon-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.02);
      animation: spinRing 25s linear infinite;
    }

    .favicon-wrapper {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      position: absolute;
      top: 12px;
      left: 12px;
    }

    .favicon-img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 4px;
    }

    .sleeping-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: var(--accent);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 4px 12px var(--accent-glow);
      border: 3px solid var(--card-bg);
      animation: pulseSleep 2s infinite ease-in-out;
    }

    .tab-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      padding: 0 10px;
    }

    .tab-url {
      font-size: 13px;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 16px;
      border-radius: 99px;
      display: inline-block;
      max-width: 85%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-border), transparent);
      margin: 24px 0;
    }

    .status-text {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
      padding: 0 20px;
    }

    .resume-btn {
      width: 100%;
      padding: 16px 32px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px var(--accent-glow);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .resume-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px var(--accent-glow);
      filter: brightness(1.1);
    }

    .resume-btn:active {
      transform: translateY(0);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      user-select: none;
      cursor: pointer;
    }

    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 2px solid var(--text-secondary);
      border-radius: 6px;
      position: relative;
      transition: all 0.2s ease;
      display: inline-block;
    }

    .checkbox-input {
      display: none;
    }

    .checkbox-input:checked + .checkbox-custom {
      background: var(--emerald);
      border-color: var(--emerald);
      box-shadow: 0 0 10px var(--emerald-glow);
    }

    .checkbox-input:checked + .checkbox-custom::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 4px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .logo-footer {
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .logo-footer:hover {
      opacity: 0.9;
    }

    .logo-icon {
      font-size: 14px;
    }

    /* Keyframe Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulseSleep {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 12px var(--accent-glow); }
      50% { transform: scale(1.12); box-shadow: 0 4px 20px var(--accent-glow), 0 0 15px var(--accent); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glass-card">
      <div class="glow-orb"></div>
      
      <!-- Icon & Favicon Section -->
      <div class="sleeping-icon-container">
        <div class="favicon-ring"></div>
        <div class="favicon-wrapper">
          <img id="favicon" src="icons/icon48.png" alt="Favicon" class="favicon-img" onerror="this.src='icons/icon48.png'">
        </div>
        <div class="sleeping-badge">🌙</div>
      </div>

      <!-- Tab Information -->
      <h1 id="title" class="tab-title">Loading Page...</h1>
      <div id="url" class="tab-url">about:blank</div>

      <div class="divider"></div>

      <!-- Status Explanation -->
      <p id="status-desc" class="status-text">
        This tab is suspended to save system memory and keep your device running fast.
      </p>

      <!-- Action Button -->
      <button id="resume-btn" class="resume-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        <span id="btn-text">Resume Tab</span>
      </button>

      <!-- Preferences -->
      <label class="toggle-container">
        <input type="checkbox" id="auto-resume" class="checkbox-input">
        <span class="checkbox-custom"></span>
        <span id="auto-resume-text">Auto resume when tab is focused</span>
      </label>

      <!-- ClickBook Footer -->
      <a href="src/newtab/index.html" class="logo-footer" target="_blank" id="footer-link">
        <span class="logo-icon">📚</span>
        <span>ClickBook Premium</span>
      </a>
    </div>
  </div>

  <script src="suspend.js"></script>
</body>
</html>
