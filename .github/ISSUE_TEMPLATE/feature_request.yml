name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas! Describe the feature you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: "What problem does this solve? Describe your use case."
      placeholder: "I often need to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "Describe how you'd like it to work"
      placeholder: "It would be great if..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (optional)
      description: "Have you tried any workarounds?"
    validations:
      required: false
